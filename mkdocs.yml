site_name: PINNS Documentation
site_description: Physics-Informed Neural Networks Library
site_url: https://grp-torres-sanchez.pages.embl.org/pinn_models/
repo_url: https://github.com/your-repo/pinn_models

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - toc.integrate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

nav:
  - Home: index.md
  - Getting Started: getting_started.md
  - API Reference:
    - Overview: api/index.md
    - Domain: api/domain.md
    - Networks: api/networks.md
    - Problem: api/problem.md
    - Trainer: api/trainer.md
    - Functional: api/functional.md
  - Examples:
    - Overview: examples/index.md
    - Heat Equation: examples/heat_equation.ipynb
    - 1D Oscillator: examples/1D_overdamped_oscillator.ipynb
    - Laser Ablation: examples/1+1_laser_ablations.ipynb

plugins:
  - search
  - mkdocs-jupyter:
      include_source: true
      execute: false
      allow_errors: false
      ignore_h1_titles: true
      show_input: true
      no_input: false

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.arithmatex:
      generic: true
  - admonition
  - tables
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
